name: Release
on:
  push:
    branches:
      - main

# Allow the workflow to create and push tags using the default GITHUB_TOKEN.
permissions:
  contents: write

# Serialise runs so two pushes can't race to create the same tag.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  tag:
    name: Tag
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags, needed to find the latest tag

      - name: Create next patch tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          latest=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          if [ -z "$latest" ]; then
            next="v0.0.1"
          else
            base=${latest#v}
            major=${base%%.*}
            rest=${base#*.}
            minor=${rest%%.*}
            patch=${rest#*.}
            next="v${major}.${minor}.$((patch + 1))"
          fi

          echo "Latest tag: ${latest:-none}; creating $next"
          git tag -a "$next" -m "Release $next"
          git push origin "$next"
