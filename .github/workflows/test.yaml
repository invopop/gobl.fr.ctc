name: Test Go
on:
  push:
    tags:
      - v*
    branches:
      - main
  pull_request:
jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          path: gobl.fr.ctc

      # TEMPORARY: this module depends on unreleased core via the
      # `replace github.com/invopop/gobl => ../gobl` directive in go.mod.
      # Provide that sibling by checking out the core branch. Remove this step
      # (and the replace) once the core release is tagged and the module pins
      # the tag.
      - name: Check out core gobl as sibling (for the replace directive)
        uses: actions/checkout@v4
        with:
          repository: invopop/gobl
          ref: fr-ctc-extract
          path: gobl

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "gobl.fr.ctc/go.mod"

      - name: Test
        working-directory: gobl.fr.ctc
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Coverage summary
        working-directory: gobl.fr.ctc
        run: go tool cover -func=coverage.out | tail -1 >> "$GITHUB_STEP_SUMMARY"

      # Runs once the repo is enabled on Codecov and a CODECOV_TOKEN secret is
      # added; skipped (keeping the build green) until then.
      - name: Upload coverage reports to Codecov
        if: env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v5.1.2
        with:
          token: ${{ env.CODECOV_TOKEN }}
          slug: invopop/gobl.fr.ctc
          files: gobl.fr.ctc/coverage.out
